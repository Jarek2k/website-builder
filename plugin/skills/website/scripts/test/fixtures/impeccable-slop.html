<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Inter, sans-serif; background: #faf6ef; }
  h1 { font-size: 84px; background: linear-gradient(90deg, #8b5cf6, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .card { border-left: 4px solid #8b5cf6; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 2px; }
  .card .inner { border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .muted { color: #b9b9b9; font-size: 11px; }
  .bounce { animation: bounce 1s infinite; }
</style>
</head>
<body>
  <h1>Supercharge your enterprise-grade next-generation workflow experience today</h1>
  <div class="card"><div class="inner"><p class="muted">Some very small low contrast body text that goes on and on across the section.</p></div></div>
  <h4>Skipped heading level</h4>
</body>
</html>
